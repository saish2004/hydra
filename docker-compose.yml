version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: hydra-db
    environment:
      MYSQL_DATABASE: hydra
      MYSQL_ROOT_PASSWORD: mysql@123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - hydra-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hydra-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/hydra?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=mysql@123
    depends_on:
      - db
    networks:
      - hydra-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hydra-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - hydra-network

volumes:
  mysql-data:

networks:
  hydra-network:
    driver: bridge
